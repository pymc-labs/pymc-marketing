task_id: mmm_multidimensional_recovery
task_type: mmm_multidimensional
dataset_path: data/mmm_multidimensional_example.csv
date_column: date
target_column: y
channel_columns:
  - x1
  - x2
cv:
  n_init: 120
  forecast_horizon: 8
  step_size: 1
  n_folds: 3
sampler:
  nuts_sampler: nutpie
  chains: 4
  cores: 4
  draws: 1_000
ground_truth:
  parameters:
    source_file: data/mmm_multidimensional_example_true_parameters.nc
  roas:
    x1: 0.0
    x2: 0.0
notes: >
  Parameter recovery must be computed against the true-parameter NetCDF generated by
  scripts/data_generators/multidimensional_data_generation.py.
  ROAS ground truth values should be computed from the same data-generating process and then
  populated in this task spec before final benchmark runs.
