# Audit-only docs build for now: this job does NOT fail on warnings.
#
# Issue #1210 tracks a backlog of Sphinx/MyST/numpydoc warnings (~700 at the
# time of writing). The plan is:
#   1. Land cleanup PRs that drive the warning count toward zero.
#   2. Once zero, flip `continue-on-error` off and add `-W` to SPHINXOPTS so any
#      new warning fails the PR.
#   3. Mirror that contract in .readthedocs.yaml via `sphinx.fail_on_warning: true`.
#
# In the meantime the job posts the warning count to the job summary so
# reviewers can see the trajectory and catch large regressions early.

name: Docs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should_build: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docs:
              - ".github/workflows/docs.yml"
              - "pyproject.toml"
              - "docs/**"
              - "pymc_marketing/**"
              - "scripts/generate_gallery.py"

  build:
    needs: changes
    if: ${{ needs.changes.outputs.should_build == 'true' }}
    runs-on: ubuntu-latest
    # Audit-only: do not block PRs while we work down the warning backlog.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install package and docs dependencies
        run: |
          sudo apt-get install graphviz graphviz-dev
          pip install -e .[docs]
          pip list
      - name: Generate gallery thumbnails
        # Mirrors what RTD runs in its pre_build step (see .readthedocs.yaml).
        run: python scripts/generate_gallery.py
      - name: Build HTML
        # --keep-going collects every warning instead of stopping at the first.
        # No -W yet (would fail the build until #1210 cleanup completes).
        run: |
          sphinx-build docs/source docs/build -b html --keep-going \
            2> docs_warnings.log
      - name: Report warning count
        if: always()
        run: |
          warnings=$(grep -cE 'WARNING|ERROR' docs_warnings.log || echo 0)
          {
            echo "## Docs build"
            echo ""
            echo "Warnings/errors: **${warnings}**"
            echo ""
            echo "<details><summary>First 50 entries</summary>"
            echo ""
            echo '```'
            grep -E 'WARNING|ERROR' docs_warnings.log | head -50 || true
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload warning log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-warnings
          path: docs_warnings.log
