name: Triage

on:
  issues:
    types: [opened]

concurrency:
  group: triage-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Claude installation
        run: claude --version

      - name: Prepare issue content
        id: prepare
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          {
            printf '%s\n' "The following issue was just opened, triage it:"
            printf '%s\n' ""
            printf '%s\n' "Title: $ISSUE_TITLE"
            printf '%s\n' ""
            printf '%s\n' "$ISSUE_BODY"
          } > /tmp/issue_content.txt

      - name: Run triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        id: triage
        run: |
          set -o pipefail
          claude -p \
            --dangerously-skip-permissions \
            --max-turns 10 \
            --agent triage \
            --print \
            < /tmp/issue_content.txt 2>&1 | tee /tmp/claude_output.log

          # Extract labels from triage output
          LABELS="$(grep '^TRIAGE: Added labels:' /tmp/claude_output.log | sed 's/^TRIAGE: Added labels: //')"
          echo "labels=${LABELS}" >> $GITHUB_OUTPUT

      - name: Apply labels
        if: success() && steps.triage.outputs.labels
        run: |
          LABELS="${{ steps.triage.outputs.labels }}"
          if [ -n "$LABELS" ]; then
            gh issue edit "${{ github.event.issue.number }}" --add-label "$LABELS"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Remove Needs Triage label
        if: success()
        run: gh issue edit "${{ github.event.issue.number }}" --remove-label "Needs Triage" || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Claude output logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-output-triage-${{ github.event.issue.number }}
          path: /tmp/claude_output.log
          retention-days: 7
