name: Triage

on:
  issues:
    types: [opened]

concurrency:
  group: triage-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Claude installation
        run: claude --version

      - name: Prepare issue content
        id: prepare
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          {
            printf '%s\n' "The following issue was just opened, triage it:"
            printf '%s\n' ""
            printf '%s\n' "Title: $ISSUE_TITLE"
            printf '%s\n' ""
            printf '%s\n' "$ISSUE_BODY"
          } > /tmp/issue_content.txt

      - name: Run triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        id: triage
        run: |
          set -o pipefail
          claude -p \
            --dangerously-skip-permissions \
            --max-turns 10 \
            --agent triage \
            --print \
            < /tmp/issue_content.txt 2>&1 | tee /tmp/claude_output.log

      - name: Extract labels
        id: extract_labels
        run: |
          # Collapse whitespace around commas so gh issue edit --add-label,
          # which splits on commas literally, does not see padded label names.
          LABELS="$(grep '^TRIAGE: Added labels:' /tmp/claude_output.log | tail -n 1 | sed 's/^TRIAGE: Added labels: *//' | sed 's/ *, */,/g' | sed 's/^ *//;s/ *$//' || true)"
          echo "labels=${LABELS}" >> "$GITHUB_OUTPUT"

      - name: Apply labels
        if: steps.extract_labels.outputs.labels
        run: |
          LABELS="${{ steps.extract_labels.outputs.labels }}"
          if [ -n "$LABELS" ]; then
            gh issue edit "${{ github.event.issue.number }}" --add-label "$LABELS"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Remove Needs Triage label
        if: steps.extract_labels.conclusion == 'success'
        run: gh issue edit "${{ github.event.issue.number }}" --remove-label "Needs Triage" || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Post triage analysis as comment
        if: steps.extract_labels.conclusion == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ ! -s /tmp/claude_output.log ]; then
            echo "No agent output to post"
            exit 0
          fi
          # Drop the workflow-control TRIAGE line; it is plumbing, not user content.
          sed '/^TRIAGE: Added labels:/d' /tmp/claude_output.log > /tmp/triage_analysis.log
          if [ ! -s /tmp/triage_analysis.log ]; then
            echo "No analysis content after stripping; skipping comment"
            exit 0
          fi
          {
            printf '%s\n' '<details>'
            printf '%s\n' '<summary>Triage analysis</summary>'
            printf '%s\n' ''
            cat /tmp/triage_analysis.log
            printf '%s\n' ''
            printf '%s\n' '</details>'
          } > /tmp/triage_comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/triage_comment.md

      - name: Upload Claude output logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-output-triage-${{ github.event.issue.number }}
          path: /tmp/claude_output.log
          retention-days: 7
