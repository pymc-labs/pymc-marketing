name: Validate Lockfile

on:
  pull_request:
    branches: [main, v1.0.0]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/validate-lockfile.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv lock --check
